<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Hogwarts Birthday Letter</title>
  <style>
    :root {
      --bg-color: #0f141d;
      --envelope-color: #e8d8b7;
      --envelope-dark: #d6c39e;
      --letter-bg: #fdf8eb;
      --seal-red: #7a1515;
      --gold: #c5a059;
      --ink-color: #3b2d1d;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent; /* Prevents tap highlight on mobile */
    }

    body {
      background-color: var(--bg-color);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      min-height: 100dvh; /* Dynamic viewport height for mobile browsers */
      margin: 0;
      font-family: 'Georgia', serif;
      overflow: hidden;
      touch-action: manipulation;
    }

    /* Hidden Checkbox Controller */
    #open-toggle {
      display: none;
    }

    /* Stage Container */
    .scene {
      position: relative;
      width: 320px;
      height: 220px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Outer Envelope Wrapper */
    .envelope-wrapper {
      position: absolute;
      width: 320px;
      height: 220px;
      background-color: var(--envelope-dark);
      border-radius: 4px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.6);
      cursor: pointer;
      transition: opacity 0.8s ease 0s, transform 0.8s ease 0s;
    }

    /* Top Flap */
    .flap {
      position: absolute;
      top: 0;
      width: 0;
      height: 0;
      border-left: 160px solid transparent;
      border-right: 160px solid transparent;
      border-top: 120px solid var(--envelope-dark);
      transform-origin: top;
      transition: transform 0.6s ease-in-out 1.2s, z-index 0.2s 1.2s;
      z-index: 4;
    }

    /* Logo Placement on Flap */
    .envelope-logo {
      position: absolute;
      top: -115px;
      left: 50%;
      transform: translateX(-50%);
      width: 75px;
      text-align: center;
      pointer-events: none;
    }

    .envelope-logo svg {
      width: 100%;
      height: auto;
      fill: var(--ink-color);
    }

    /* Envelope Pocket Front */
    .pocket {
      position: absolute;
      bottom: 0;
      width: 0;
      height: 0;
      border-left: 160px solid var(--envelope-color);
      border-right: 160px solid var(--envelope-color);
      border-top: 110px solid transparent;
      border-bottom: 110px solid var(--envelope-color);
      border-radius: 0 0 4px 4px;
      z-index: 3;
    }

    /* Wax Seal */
    .wax-seal {
      position: absolute;
      top: 90px;
      left: 50%;
      transform: translateX(-50%);
      width: 45px;
      height: 45px;
      background: var(--seal-red);
      border-radius: 50%;
      border: 2px solid #520d0d;
      box-shadow: 0 3px 6px rgba(0,0,0,0.4);
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--gold);
      font-weight: bold;
      font-size: 20px;
      z-index: 5;
      transition: opacity 0.4s ease 1.6s;
    }

    /* --- THE LETTER --- */
    .letter {
      position: absolute;
      top: 10px;
      left: 15px;
      width: 290px;
      height: 200px;
      background: var(--letter-bg);
      border: 1px solid #d4c5a9;
      border-radius: 6px;
      padding: 20px;
      box-sizing: border-box;
      z-index: 2;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
      cursor: pointer;
      -webkit-overflow-scrolling: touch; /* Smooth momentum scrolling on mobile */
      transition: transform 0.8s ease-in-out 0.6s, 
                  width 0.6s ease-in-out 0s, 
                  height 0.6s ease-in-out 0s, 
                  left 0.6s ease-in-out 0s, 
                  top 0.6s ease-in-out 0s,
                  z-index 0.1s 1.2s;
    }

    .letter-header {
      text-align: center;
      border-bottom: 2px solid var(--gold);
      padding-bottom: 8px;
      margin-bottom: 15px;
    }

    .letter-logo {
      width: 45px;
      height: auto;
      margin: 0 auto 4px auto;
      display: block;
    }

    .letter-logo svg {
      width: 100%;
      height: auto;
      fill: var(--ink-color);
    }

    .hogwarts-crest {
      font-size: 18px;
      font-weight: bold;
      color: var(--seal-red);
      letter-spacing: 2px;
      line-height: 1.1;
    }

    .letter-body {
      font-size: 13px;
      line-height: 1.5;
      color: #2b2b2b;
      opacity: 0;
      transition: opacity 0.3s ease 0s;
    }

    /* --- OPEN STATE ANIMATIONS --- */

    #open-toggle:checked + .scene .flap {
      transform: rotateX(180deg);
      z-index: 1;
      transition: transform 0.6s ease-in-out 0s, z-index 0.2s 0.6s;
    }

    #open-toggle:checked + .scene .wax-seal {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease 0.2s;
    }

    #open-toggle:checked + .scene .letter {
      z-index: 10;
      transform: translateY(-160px);
      transition: transform 0.8s ease-in-out 0.5s, 
                  width 0.8s ease-in-out 1.2s, 
                  height 0.8s ease-in-out 1.2s, 
                  left 0.8s ease-in-out 1.2s, 
                  top 0.8s ease-in-out 1.2s,
                  z-index 0.1s 0.5s;
    }

    #open-toggle:checked + .scene .envelope-wrapper {
      opacity: 0;
      transform: translateY(100px) scale(0.9);
      pointer-events: none;
      transition: opacity 0.8s ease 1.2s, transform 0.8s ease 1.2s;
    }

    /* Mobile Screen Adjustments for Expanded Letter */
    #open-toggle:checked + .scene .letter {
      top: 50%;
      left: 50%;
      width: 88vw;
      max-width: 420px;
      height: auto;
      max-height: 80vh;
      max-height: 80dvh; /* Adapts to mobile URL bar expanding/collapsing */
      transform: translate(-50%, -50%);
      box-shadow: 0 20px 50px rgba(0,0,0,0.7);
      overflow-y: auto;
      padding: 25px 20px;
    }

    #open-toggle:checked + .scene .letter-body {
      opacity: 1;
      transition: opacity 0.6s ease 1.8s;
    }

    /* Adjust Envelope Size for Extra Small Screens (e.g. iPhone SE / smaller Androids) */
    @media (max-width: 360px) {
      .scene {
        transform: scale(0.88);
      }
    }
  </style>
</head>
<body>

  <!-- Hidden Toggle Checkbox -->
  <input type="checkbox" id="open-toggle">

  <div class="scene">
    <!-- Interactive Envelope -->
    <label for="open-toggle" class="envelope-wrapper">
      <div class="flap">
        <div class="envelope-logo">
          <svg viewBox="0 0 100 110" xmlns="http://www.w3.org/2000/svg">
            <path d="M 15,12 Q 50,2 85,12 Q 50,7 15,12 Z" fill="#3b2d1d" />
            <text x="50" y="10" font-family="'Georgia', serif" font-size="7" font-weight="bold" text-anchor="middle" fill="#3b2d1d" letter-spacing="1">HOGWARTS</text>
            <path d="M 20,18 L 80,18 L 80,55 Q 80,85 50,100 Q 20,85 20,55 Z" fill="none" stroke="#3b2d1d" stroke-width="2.5"/>
            <path d="M 23,21 L 77,21 L 77,54 Q 77,82 50,96 Q 23,82 23,54 Z" fill="none" stroke="#3b2d1d" stroke-width="1"/>
            <line x1="50" y1="21" x2="50" y2="96" stroke="#3b2d1d" stroke-width="1.5"/>
            <line x1="23" y1="52" x2="77" y2="52" stroke="#3b2d1d" stroke-width="1.5"/>
            <polygon points="40,42 60,42 60,62 40,62" fill="var(--envelope-dark)" stroke="#3b2d1d" stroke-width="1.5"/>
            <text x="50" y="57" font-family="'Georgia', serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#3b2d1d">H</text>
            <path d="M 32,30 Q 38,28 36,38 Q 30,36 32,30 Z" fill="#3b2d1d"/>
            <path d="M 62,30 Q 70,32 64,38 Q 62,42 68,40" fill="none" stroke="#3b2d1d" stroke-width="1.5"/>
            <path d="M 30,68 Q 36,66 38,72 Q 32,76 30,68 Z" fill="#3b2d1d"/>
            <path d="M 64,66 L 72,70 L 66,76 Z" fill="#3b2d1d"/>
            <path d="M 10,95 Q 50,110 90,95 Q 50,103 10,95 Z" fill="#3b2d1d"/>
          </svg>
        </div>
      </div>

      <div class="wax-seal">H</div>
      <div class="pocket"></div>
    </label>

    <!-- The Hogwarts Letter (Tap anywhere on the letter to close/reseal) -->
    <label for="open-toggle" class="letter">
      <div class="letter-header">
        <div class="letter-logo">
          <svg viewBox="0 0 100 110" xmlns="http://www.w3.org/2000/svg">
            <path d="M 15,12 Q 50,2 85,12 Q 50,7 15,12 Z" fill="#3b2d1d" />
            <text x="50" y="10" font-family="'Georgia', serif" font-size="7" font-weight="bold" text-anchor="middle" fill="#3b2d1d" letter-spacing="1">HOGWARTS</text>
            <path d="M 20,18 L 80,18 L 80,55 Q 80,85 50,100 Q 20,85 20,55 Z" fill="none" stroke="#3b2d1d" stroke-width="2.5"/>
            <path d="M 23,21 L 77,21 L 77,54 Q 77,82 50,96 Q 23,82 23,54 Z" fill="none" stroke="#3b2d1d" stroke-width="1"/>
            <line x1="50" y1="21" x2="50" y2="96" stroke="#3b2d1d" stroke-width="1.5"/>
            <line x1="23" y1="52" x2="77" y2="52" stroke="#3b2d1d" stroke-width="1.5"/>
            <polygon points="40,42 60,42 60,62 40,62" fill="var(--letter-bg)" stroke="#3b2d1d" stroke-width="1.5"/>
            <text x="50" y="57" font-family="'Georgia', serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#3b2d1d">H</text>
            <path d="M 32,30 Q 38,28 36,38 Q 30,36 32,30 Z" fill="#3b2d1d"/>
            <path d="M 62,30 Q 70,32 64,38 Q 62,42 68,40" fill="none" stroke="#3b2d1d" stroke-width="1.5"/>
            <path d="M 30,68 Q 36,66 38,72 Q 32,76 30,68 Z" fill="#3b2d1d"/>
            <path d="M 64,66 L 72,70 L 66,76 Z" fill="#3b2d1d"/>
            <path d="M 10,95 Q 50,110 90,95 Q 50,103 10,95 Z" fill="#3b2d1d"/>
          </svg>
        </div>
        <div class="hogwarts-crest">HOGWARTS</div>
        <small style="color: #666; font-size: 11px;">School of Witchcraft & Wizardry</small>
      </div>

      <div class="letter-body">
        <p><strong>Dear [Name],</strong></p>
        <p>We are pleased to inform you that you have been granted another magical year of life!</p>
        <p>Please find enclosed a list of all necessary requirements for the upcoming year:</p>
        <ul style="padding-left: 20px; margin: 12px 0;">
          <li>1 Cauldron full of good health & resilience</li>
          <li>1 Pair of Dragonhide boots for grand adventures</li>
          <li>Unlimited happiness, laughter, and wisdom</li>
          <li>1 Wand capable of turning everyday moments into magic</li>
        </ul>
        <p>All students must be equipped with an open heart and an unyielding spirit of curiosity. Words are, in our not-so-humble opinion, our most inexhaustible source of magic, capable of both inflicting injury and remedying it.</p>
        <p>May your day be as extraordinary as a winning catch in Quidditch, and may the year ahead bring endless joy and prosperity!</p>
        <br>
        <p style="text-align: right; margin-top: 15px;">
          <em>Yours sincerely,</em><br><br>
          <strong>Minerva McGonagall</strong><br>
          <small>Deputy Headmistress</small>
        </p>
      </div>
    </label>
  </div>

</body>
</html>
